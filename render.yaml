services:
  - type: web
    name: scamcheck-api-minhkhoitn12345
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120 backend.app:app
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://minhkhoitn12345.github.io
      - key: GEMINI_MODELS
        value: gemini-3.1-flash-lite,gemini-2.5-flash-lite,gemini-3.5-flash
      - key: RATE_LIMIT_PER_HOUR
        value: "120"
      - key: ENABLE_EVALUATION
        value: "false"
